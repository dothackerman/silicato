name: Feature request
description: Propose an improvement to Dialogos
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem and proposal clearly. Keep current RC scope in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe expected behavior and CLI UX.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope impact
      description: Does this stay within current scope or require a future milestone?
      placeholder: Requires future milestone because...
    validations:
      required: true
